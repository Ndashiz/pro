name = "lazypo-auth-gate"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Don't expose the Worker on workers.dev — only via the configured route.
workers_dev = false

# Match every request under /lazypo/* on the prod zone. GitHub Pages
# (configured as the origin in your Cloudflare DNS) serves the actual
# files; the Worker is the gate in front.
[[routes]]
pattern = "ndashiz.be/pro/*"
zone_name = "ndashiz.be"

# Supabase anon key (publishable — safe as a plain var).
[vars]
SUPABASE_ANON_KEY = "sb_publishable_Mj-FuPZcN_oTeLQ0ME84yQ_uulPdJ4c"

# Secrets (set via `wrangler secret put <NAME>`):
# SUPABASE_JWT_SECRET    — Supabase project JWT secret (HS256 verification)
# LAZYPO_EMBED_EMAIL     — email for silent quiz embed auth
# LAZYPO_EMBED_PASSWORD  — password for silent quiz embed auth
