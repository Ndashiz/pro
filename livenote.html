<!DOCTYPE html>
<html lang="en">
<head>
<script>if(location.protocol==="http:"&&location.hostname!=="localhost"&&location.hostname!=="127.0.0.1")location.replace("https:"+location.href.slice(5));</script>
<script src="auth-gate.js"></script>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<script>
  const p = window.location.pathname, l = p.toLowerCase();
  if (p !== l) window.location.replace(l);
</script>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveNote — LazyPO</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1c1c1c;
  --border:#222;--border2:#2a2a2a;
  --accent:#3b82f6;--accent2:#60a5fa;
  --text:#f0f0f0;--muted:#6b6b6b;--r:10px;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

.main-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 20%,rgba(20,40,80,.5) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 85% 80%,rgba(30,58,110,.15) 0%,transparent 60%)}
.main-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black,transparent)}

.main{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:52px 32px 80px}

/* ── Header ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;gap:16px;flex-wrap:wrap}
.page-header-left{display:flex;align-items:center;gap:14px}
.page-icon{width:44px;height:44px;border-radius:12px;background:rgba(59,130,246,.12);border:1px solid rgba(96,165,250,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.page-title{font-size:24px;font-weight:700}
.page-subtitle{font-size:13px;color:var(--muted);margin-top:2px}
.btn-new{
  display:flex;align-items:center;gap:8px;padding:10px 18px;
  background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;text-decoration:none;transition:background .15s,transform .15s;
}
.btn-new:hover{background:#2563eb;transform:translateY(-1px)}

/* ── Join bar ── */
.join-bar{display:flex;gap:10px;margin-bottom:32px}
.join-input{
  flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;
  outline:none;transition:border-color .15s;
}
.join-input::placeholder{color:var(--muted)}
.join-input:focus{border-color:var(--accent)}
.btn-join{
  padding:10px 16px;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:var(--r);font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap;
}
.btn-join:hover{background:#2e2e2e}

/* ── Section label ── */
.section-label{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  letter-spacing:.08em;color:var(--muted);text-transform:uppercase;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Notice ── */
.notice{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:rgba(59,130,246,.07);border:1px solid rgba(96,165,250,.15);
  border-radius:8px;font-size:12.5px;color:var(--muted);margin-bottom:28px;
}
.notice svg{flex-shrink:0;color:var(--accent2)}

/* ── Doc grid ── */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}

.doc-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;cursor:pointer;text-decoration:none;color:inherit;
  transition:border-color .18s,transform .18s,background .18s;
  display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;
}
.doc-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(59,130,246,.4),transparent);
  opacity:0;transition:opacity .2s;
}
.doc-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
.doc-card:hover::before{opacity:1}
.doc-card.expired{opacity:.45;pointer-events:none}

.dc-top{display:flex;align-items:center;gap:10px}
.dc-emoji{font-size:20px;line-height:1;flex-shrink:0}
.dc-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

.dc-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);gap:8px}
.dc-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{
  padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;
  border:1px solid;white-space:nowrap;
}
.badge-mode{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.25);color:#c084fc}
.badge-expiry{background:rgba(59,130,246,.1);border-color:rgba(96,165,250,.2);color:var(--accent2)}
.badge-expired{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#f87171}
.badge-conn{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#34d399}

.dc-shortid{
  font-family:'DM Mono',monospace;font-size:11px;color:#333;
  letter-spacing:.05em;
}

.doc-card-del{
  position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:6px;
  background:transparent;border:none;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity .15s,background .15s,color .15s;
}
.doc-card:hover .doc-card-del{opacity:1}
.doc-card-del:hover{background:rgba(239,68,68,.12);color:#f87171}

/* ── Empty / skeleton ── */
.empty-state{
  grid-column:1/-1;text-align:center;padding:56px 24px;color:var(--muted);
}
.empty-icon{font-size:38px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px;line-height:1.6}

.skeleton{background:var(--surface);border:1px solid var(--border);border-radius:14px;height:108px;animation:sk 1.4s ease infinite}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.8}}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  font-size:13px;font-weight:500;padding:9px 18px;border-radius:100px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .main{padding:52px 16px 60px}
  .page-header{flex-direction:column;align-items:flex-start}
  .doc-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="main-bg"></div>
<div class="main-grid"></div>

<script src="sidebar.js"></script>
<script src="auth.js"></script>

<div class="main">
  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">📝</div>
      <div>
        <div class="page-title">LiveNote</div>
        <div class="page-subtitle">Real-time collaborative editor</div>
      </div>
    </div>
    <button class="btn-new" id="btnNew">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New document
    </button>
  </div>

  <!-- Notice -->
  <div class="notice">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    LiveNote links expire after <strong>&nbsp;24 hours&nbsp;</strong>. All content is automatically deleted.
  </div>

  <!-- Join by link or code -->
  <div class="join-bar">
    <input type="text" class="join-input" id="joinInput" placeholder="Paste a link or code (e.g. K7M3XNQAB)…">
    <button class="btn-join" id="btnJoin">Join →</button>
  </div>

  <!-- Docs list -->
  <div class="section-label">My documents</div>
  <div class="doc-grid" id="docGrid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const EMOJIS = ['📄','📃','📋','🗒️','📑','📜','🗂️','📂','✏️','🖊️'];

function toast(msg, ms = 2600) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtExpiry(isoStr) {
  if (!isoStr) return null;
  const rem = new Date(isoStr).getTime() - Date.now();
  if (rem <= 0) return null; // expired
  const h = Math.floor(rem / 3600000);
  const m = Math.floor((rem % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function relTime(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), d = Math.floor(diff / 86400000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m`;
  if (h < 24) return `${h}h`;
  return `${d}d`;
}

function genShortId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const bytes = new Uint8Array(9);
  crypto.getRandomValues(bytes);
  return Array.from(bytes, b => chars[b % chars.length]).join('');
}

function renderGrid(docs) {
  const grid = document.getElementById('docGrid');
  if (!docs.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><p>No documents yet.<br>Create your first collaborative document.</p></div>`;
    return;
  }
  grid.innerHTML = docs.map((doc, i) => {
    const emoji   = EMOJIS[i % EMOJIS.length];
    const expiry  = fmtExpiry(doc.expires_at);
    const expired = !expiry;
    const mode    = doc.mode === 'html' ? 'HTML' : 'TXT';
    const conns   = doc.total_connections ?? 0;
    return `
      <a class="doc-card${expired ? ' expired' : ''}" href="livenote_editor.html?id=${esc(doc.short_id || doc.id)}">
        <div class="dc-top">
          <div class="dc-emoji">${emoji}</div>
          <div class="dc-title">${esc(doc.title || 'Untitled')}</div>
        </div>
        <div class="dc-meta">
          <div class="dc-badges">
            <span class="badge badge-mode">${mode}</span>
            ${expired
              ? `<span class="badge badge-expired">Expired</span>`
              : `<span class="badge badge-expiry">⏳ ${expiry}</span>`}
            ${conns > 0 ? `<span class="badge badge-conn">👥 ${conns}</span>` : ''}
          </div>
          <span>${relTime(doc.updated_at)} ago</span>
        </div>
        <div class="dc-meta">
          <span class="dc-shortid">${esc(doc.short_id || '').toUpperCase()}</span>
        </div>
        <button class="doc-card-del" title="Delete" onclick="delDoc(event,'${esc(doc.short_id || doc.id)}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </a>`;
  }).join('');
}

async function loadDocs(userId) {
  const { data, error } = await sb
    .from('livenote_docs')
    .select('id, short_id, title, mode, updated_at, expires_at, total_connections')
    .eq('created_by', userId)
    .order('updated_at', { ascending: false })
    .limit(50);
  if (error) {
    document.getElementById('docGrid').innerHTML = `<div class="empty-state"><p style="color:#f87171">Error: ${esc(error.message)}</p></div>`;
    return;
  }
  renderGrid(data || []);
}

async function createDoc(userId) {
  const btn = document.getElementById('btnNew');
  btn.disabled = true; btn.textContent = 'Creating…';
  const shortId = genShortId();
  const { data, error } = await sb.from('livenote_docs').insert({
    short_id:   shortId,
    title:      'Untitled',
    created_by: userId,
    mode:       'plaintext',
    content:    '',
    expires_at: new Date(Date.now() + 86400000).toISOString()
  }).select().single();
  if (error) {
    toast('Error: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New document`;
    return;
  }
  window.location.href = `livenote_editor.html?id=${data.short_id}`;
}

window.delDoc = async function(e, shortId) {
  e.preventDefault(); e.stopPropagation();
  if (!confirm('Permanently delete this document?')) return;
  const { error } = await sb.from('livenote_docs').delete().eq('short_id', shortId);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Document deleted');
  e.target.closest('.doc-card')?.remove();
  if (!document.querySelectorAll('.doc-card').length) renderGrid([]);
};

function joinDoc() {
  const val = document.getElementById('joinInput').value.trim().toUpperCase();
  if (!val) return;
  // Match full URL with id param
  const urlMatch = val.match(/[?&]ID=([A-Z0-9]{9})/i);
  // Match raw 9-char code
  const codeMatch = val.match(/\b([A-Z0-9]{9})\b/);
  const id = urlMatch?.[1] || codeMatch?.[1];
  if (id) {
    window.location.href = `livenote_editor.html?id=${id}`;
  } else {
    toast('Invalid code — 9 characters expected (e.g. K7M3XNQAB)');
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const session = await LazyAuth.requireModule('livenote');
  if (!session) return;
  await loadDocs(session.user.id);
  document.getElementById('btnNew').addEventListener('click', () => createDoc(session.user.id));
  document.getElementById('btnJoin').addEventListener('click', joinDoc);
  document.getElementById('joinInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinDoc(); });
});

/* ── Demo Mode ── */
window.loadDemoData = function () {
  const now = Date.now();
  const mockDocs = [
    { short_id: 'DEMO0A1B2', title: '📋 Sprint Review — PI 2026.2',   mode: 'plaintext', total_connections: 3, updated_at: new Date(now - 2 * 60000).toISOString(),    expires_at: new Date(now + 22 * 3600000).toISOString() },
    { short_id: 'DEMO0C3D4', title: '🚀 Product Roadmap Q3 2026',     mode: 'html',      total_connections: 1, updated_at: new Date(now - 10 * 60000).toISOString(),   expires_at: new Date(now + 20 * 3600000).toISOString() },
    { short_id: 'DEMO0E5F6', title: '🐛 Bug Triage — Platform Team',  mode: 'plaintext', total_connections: 2, updated_at: new Date(now - 60 * 60000).toISOString(),   expires_at: new Date(now + 18 * 3600000).toISOString() },
    { short_id: 'DEMO0G7H8', title: '✍️ Retrospective Notes S2026.2', mode: 'plaintext', total_connections: 5, updated_at: new Date(now - 3 * 3600000).toISOString(),  expires_at: new Date(now + 14 * 3600000).toISOString() },
  ];
  renderGrid(mockDocs);
  /* Make mock cards non-navigating with a visual demo hint */
  document.querySelectorAll('.doc-card').forEach(card => {
    card.removeAttribute('href');
    card.style.cursor = 'default';
    card.addEventListener('click', e => {
      e.preventDefault();
      const t = document.getElementById('toast');
      if (t) { t.textContent = '🧪 Demo mode — create a real document to collaborate'; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800); }
    });
  });
  /* Demo banner above the grid */
  const existing = document.getElementById('_demoBanner');
  if (!existing) {
    const banner = document.createElement('div');
    banner.id = '_demoBanner';
    banner.style.cssText = 'background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:11px 16px;font-size:13px;color:#fbbf24;margin-bottom:16px;display:flex;align-items:center;gap:8px;';
    banner.innerHTML = '🧪 <span><strong>Demo mode</strong> — mock documents shown. Click "New document" to start collaborating for real.</span>';
    const grid = document.getElementById('docGrid');
    grid.parentNode.insertBefore(banner, grid);
  }
};
</script>
<script src="demo.js"></script>
<script src="focusfm.js"></script>
</body>
</html>
